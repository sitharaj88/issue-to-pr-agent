name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: pip install .

      - name: Run unit tests
        run: python -m unittest discover -s tests/unit -v

      - name: Run integration tests
        run: python -m unittest discover -s tests/integration -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t issue-to-pr-agent:ci .

      - name: Smoke test container
        run: |
          docker run -d --name smoke -p 8080:8080 \
            -e ISSUE_TO_PR_ARTIFACT_DIR=/data \
            issue-to-pr-agent:ci
          sleep 5
          curl -sf http://localhost:8080/healthz
          docker stop smoke
